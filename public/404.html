<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>UTFPR Buy e Sell</title>
    <script>
      // SPA fallback para GitHub Pages: redireciona qualquer rota
      // desconhecida para a raiz, preservando o hash (#secao).
      (function () {
        var path = window.location.pathname;
        var base = path.split("/").slice(0, -1).join("/") + "/";
        window.location.replace(base + window.location.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
